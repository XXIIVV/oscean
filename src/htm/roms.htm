<h2>The roms are applications for the Varvara System.</h2>

<p>The roms are a collection of <a href='varvara.html'>Varvara</a> programs serving as the foundation for the <a href='hundred_rabbits.html'>Hundred Rabbits</a> ecosystem. The average application size is about 10kb. If you're looking for an operating system for your Varvara computer, try a <a href='potato.html'>Potato</a>.</p>
