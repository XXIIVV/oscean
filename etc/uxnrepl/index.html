<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta property='og:type' content='website'/>
	<meta property='og:site_name' content="Uxn Interpreter"/>
	<meta property="og:title" content="Uxntal Playground"/>
	<meta property='og:description' content="By Devine Lu Linvega"/>
	<meta property='og:logo' content="https://wiki.xxiivv.com/media/services/uxn_icon.png"/>
	<meta property='og:image' content="https://wiki.xxiivv.com/media/services/uxn_logo.png"/>
	<meta property="og:url" content="https://rabbits.srht.site/uxn5/index.html"/>
	<meta name="viewport" content="width=device-width" />
	<link href="../../media/services/uxn_icon.png" type="image/png" rel="shortcut icon">
	<title>Uxntal Playground</title>
	<script src="src/uxn.js"></script>
	<script src="src/emu.js"></script>
	<script src="src/asm.js"></script>
	<script src="src/examples.js"></script>
</head>
<body>
	<textarea id="editor" spellcheck="false">
( This is a comment, and is ignored by the assembler.
  Click the Eval button to evaluate the program.
  Select the next example with the dropdown. )

;text                   ( Push text pointer )

@while                  ( Create while label )

    LDAk DUP ?{         ( Load byte at address, jump if not null )
        POP POP2 BRK }  ( When null, pop text pointer, halt )
    #18 DEO             ( Send byte to Console/write port )
    INC2 !while         ( Incr text pointer, jump to label )

@text                   ( Create text label )

	"Hello 20 "World! 00
</textarea>
	<div id='logs'>Press <b>Eval</b> to run the program.</div>
	<div id='menu'>
		<input type="button" id="eval" value="Eval">
		<input type="button" id="run" value="Run">
		<input type="button" id="step" value="Step">
		<span id='result'><a href='../../site/uxntal.html' target='_blank'>Read Manual</a></span>
		<input type="button" id="hex" class="option" value="Hex">
		<input type="button" id="rom" class="option" value="Rom">
		<select id="examples"></select>
	</div>
	<style>
		body { font-family:monospace; overflow:hidden; height:100vh; padding:0; margin:0 }
		body a { color: black }
		body ::selection { text-decoration:none; background:#000;color:#fff }
		noscript { width: 100%; height:100% }
		textarea { resize:none; width:calc(100vw - 20px); height:100vh; border:0; padding:10px; margin:0px; tab-size: 2 }
		textarea:focus { outline: none !important }
		div#logs { padding:10px; color:black; height:85px; overflow-x:hidden; overflow-y:scroll; white-space:pre; display:none }
		div#menu { height:25px; padding:10px; margin-bottom:20px;font-weight:bold; display:none }
		div#menu select { float:right }
		div#menu a { text-decoration: none; font-weight:normal }
		div#menu a:hover { text-decoration: underline }
		div#menu .option { float:right; margin-left:10px; cursor:pointer }
		body.active textarea { height:calc(100% - 170px) }
		body.active #logs, body.active #menu, body.active #editor { display:block !important }
		#run, #step, #eval { cursor:pointer; border:0px; border-radius:100px; line-height:24px; padding:0px 10px; font-size:12px }
		/* Overrides */
		body ::selection { background:#000;color:#fff }
		textarea { background:#efefef }
		div#logs { background:#8ff2d9; color:black }
		div#menu { background:#72dec2 }
		#eval { background:#000; color:white }
		#eval:hover { background: #fff; color:#000 }
		#step { background: #fff; color:black}
		#step:hover { background: #58ac96; color:#000 }
		#run { display:none }
	</style>
	<script>
'use strict'

const repl = new Repl(assembler, "Run").init()

let emulator
let ended = 0

const logs_el = document.getElementById("logs")
const editor_el = document.getElementById("editor")
const result_el = document.getElementById("result")
const eval_el = document.getElementById("eval")
const step_el = document.getElementById("step")

const opcodes = [
	"LIT", "INC", "POP", "NIP", "SWP", "ROT", "DUP", "OVR",
	"EQU", "NEQ", "GTH", "LTH", "JMP", "JCN", "JSR", "STH",
	"LDZ", "STZ", "LDR", "STR", "LDA", "STA", "DEI", "DEO",
	"ADD", "SUB", "MUL", "DIV", "AND", "ORA", "EOR", "SFT"]

function assemble(query, program) {
	let emu_asm = new Emu()
	let rom_length = 0
	emu_asm.console.write = (char) => { program[rom_length++] = char }
	emu_asm.uxn.load(assembler).eval(0x0100)
	logs_el.innerHTML = ""
	for (let i = 0; i < query.length; i++)
		emu_asm.console.input(query.charAt(i).charCodeAt(0), 1)
	emu_asm.console.input(0x0a, 2)
	emu_asm.console.input(0x00, 4)
	result_el.innerHTML = `> ${emu_asm.console.stdout_body}`
	logs_el.innerHTML = emu_asm.console.stderr_body
	logs_el.scrollTop = logs_el.scrollHeight;
	return rom_length
}

function make_opcode(byte) {
	if(byte == 0x00) return "BRK"
	if(byte == 0x20) return "JCI"
	if(byte == 0x40) return "JMI"
	if(byte == 0x60) return "JSI"
	if((byte & 0x1f) == 0) return "LIT" + (byte & 0x20 ? "2" : "") + (byte & 0x40 ? "r" : "")
	return opcodes[byte & 0x1f] + (byte & 0x20 ? "2" : "") + (byte & 0x80 ? "k" : "") + (byte & 0x40 ? "r" : "")
}

function status(v, run, step) {
	ended = v
	eval_el.value = run
	if(step)
		step_el.value = step, step_el.style.display = "inline-block"
	else
		step_el.style.display = "none"
}

function setup() {
	let program = new Uint8Array(0x10000)
	let res = assemble(editor_el.value, program)
	emulator = new Emu()
	emulator.uxn.load(program).init()
	return res
}

function run() {
	let res = setup()
	if(!res) {
		result_el.innerHTML = "Compilation failed."
		status(1, "Eval", 0)
		return
	}
	emulator.uxn.eval(0x100)
	logs_el.innerHTML += emulator.console.stdout_body
	if(emulator.console.stdout_body)
		logs_el.scrollTop = logs_el.scrollHeight;
	result_el.innerHTML = emulator.system.print_wst()
	status(1, "Restart", "Step")
}

// Editor

eval_el.addEventListener("click", run)

editor_el.addEventListener("keydown", (e) => {
	let { keyCode } = e
	let { value, selectionStart, selectionEnd } = editor
	if (keyCode === 9) { // TAB = 9
		e.preventDefault()
		editor.value = value.slice(0, selectionStart) + "\t" + value.slice(selectionEnd);
		editor.setSelectionRange(selectionStart+1, selectionStart+1)
	}
	else if (event.ctrlKey && event.key === 'Enter')
		run();
	if(!ended)
		status(1, "Restart", "Step")
});

step_el.addEventListener("click", () => {
	if(!emulator || ended) {
		let res = setup()
		if(!res) {
			result_el.innerHTML = "Compilation failed."
			status(1, "Eval", 0)
			return
		}
		ended = 0;
	}
	let opc = emulator.uxn.step()
	if(emulator.console.stdout_body)
		logs_el.innerHTML = emulator.console.stdout_body
	logs_el.scrollTop = logs_el.scrollHeight;
	if(!opc) {
		status(1, "Restart", "Done")
		return;
	}
	result_el.innerHTML = emulator.system.print_wst()
	status(0, "Finish", make_opcode(opc))
})

document.getElementById("rom").addEventListener("click", () => {
	let program = new Uint8Array(0x10000)
	let length = assemble(editor_el.value.replace(/(\r\n|\n|\r|\t)/gm, " "), program)
	if(length) {
		let cropped = new Uint8Array(length)
		for(let i = 0; i < length; i++)
			cropped[i] = program[i]
		let blob = new Blob([cropped]);
		let blobUrl = URL.createObjectURL(blob);
		let link = document.createElement("a");
		link.href = blobUrl;
		link.download = "saved.rom"
		link.click()
		URL.revokeObjectURL(blobUrl)
		link.remove()
	}
})

document.getElementById("hex").addEventListener("click", () => {
	let program = new Uint8Array(0x10000)
	let length = assemble(editor_el.value.replace(/(\r\n|\n|\r|\t)/gm, " "), program)
	if(length) {
		let body = ""
		for(let i = 0; i < length; i++)
			body += `${program[i].toString(16).padStart(2, '0')}${(i + 1) % 0x10 ? ' ' : '\n'}`
		repl.popup(body)
	}
})

</script>
</body>
</html>
