<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta property='og:type' content='website'/>
	<meta property='og:site_name' content='Varvara5'/>
	<meta property='og:description' content="By Hundred Rabbits"/>
	<meta property='og:logo' content="media/services/modal_icon.png"/>
	<meta property='og:image' content="media/services/modal_image.png"/>
	<meta property="og:title" content="Modal Interpreter"/>
	<meta property="og:url" content="https://wiki.xxiivv.com/site/modal.html"/>
	<meta name="viewport" content="width=device-width" />
	<link href="../../media/services/modal_icon.png" type="image/png" rel="shortcut icon">
	<title>Modal Playground</title>
	<script src="../uxnrepl/src/uxn.js"></script>
	<script src="../uxnrepl/src/emu.js"></script>
	<script src="src/modal.js"></script>
	<script src="src/examples.js"></script>
</head>
<body>
	<textarea id="editor" spellcheck="false">
<> (Welcome to the Modal playground,
    Click the Rewrite button to evaluate the program.
    Select other examples with the dropdown.)

<> (equal ?a ?a) (Bool True) 
<> (equal ?a ?b) (Bool False)

<> (Rules are made of a left and a right side.
    They are tested in from first to last, from left to right.
    When a match occurs, the lhs is replaced by the rhs.
    Wildcards prefixed with ? will always match.

    Rules without a right-hand side are comments.
    Printing is done with the ?: wildcard.)

<> (print-bool (Bool ?:)) (done.)

(print-bool (equal baz baz))</textarea>
	<div id='logs'>Press <b>Rewrite</b> to evaluate.</div>
	<div id='menu'>
		<input type="button" id="run" value="Loading..">
		<span id='result'><a href='../../site/modal.html' target='_blank'>Read Manual</a></span>
		<select id="examples"></select>
	</div>
	<script type="text/javascript">new Repl(modal, "Rewrite").init()</script>
	<style>
		body { font-family:monospace; overflow:hidden; height:100vh; padding:0; margin:0 }
		body a { color: black }
		body ::selection { text-decoration:none; background:#000;color:#fff }
		noscript { width: 100%; height:100% }
		textarea { resize:none; width:calc(100vw - 20px); height:100vh; border:0; padding:10px; margin:0px; tab-size: 2 }
		textarea:focus { outline: none !important }
		div#logs { padding:10px; color:black; height:85px; overflow-x:hidden; overflow-y:scroll; white-space:pre; display:none }
		div#menu { height:25px; padding:10px; margin-bottom:20px;font-weight:bold; display:none }
		div#menu select { float:right }
		div#menu a { text-decoration: none; font-weight:normal }
		div#menu a:hover { text-decoration: underline }
		body.active textarea { height:calc(100% - 170px) }
		body.active #logs, body.active #menu, body.active #editor { display:block !important }
		#run { cursor:pointer; border:0px; border-radius:100px; line-height:24px; padding:0px 10px; font-size:12px }
		/* Overrides */
		body ::selection { background:#ffbb3a;color:#000 }
		textarea { background:#eee; color:black }
		div#logs { background:#ddd; color:#333 }
		div#menu { background:#ccc; color:#666 }
		div#menu a { color:#666 }
		#run { background:#fff; color:black }
		#run:hover { background: #000; color:#fff }
	</style>
</body>
</html>
