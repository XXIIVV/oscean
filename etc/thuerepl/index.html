<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta property='og:type' content='website'/>
	<meta property='og:site_name' content='Varvara5'/>
	<meta property='og:description' content="By Hundred Rabbits"/>
	<meta property='og:logo' content="media/services/logo.jpg"/>
	<meta property="og:title" content="Thue Interpreter"/>
	<meta property="og:url" content="https://wiki.xxiivv.com/site/neur.html"/>
	<meta name="viewport" content="width=device-width" />
	<link href="media/services/icon.png" type="image/png" rel="shortcut icon">
	<title>Thue Interpreter</title>
	<script src="../uxnrepl/src/uxn.js"></script>
	<script src="../uxnrepl/src/emu.js"></script>
	<script src="src/thue.js"></script>
	<script src="src/examples.js"></script>
</head>
<body>
	<textarea id="editor" spellcheck="false">
kingdom, no knight.::=A kingdom was lost, all for the want of a nail.
no horse::=no knight
no shoe::=no horse
no nail::=no shoe
::=
kingdom, no nail.</textarea>
	<div id='logs'>Press <b>Reduce</b> to evaluate.</div>
	<div id='menu'>
		<input type="button" id="run" value="Loading..">
		<span id='result'><a href='../../site/rejoice.html' target='_blank'>Read Manual</a></span>
		<select id="examples"></select>
	</div>
	<script type="text/javascript">new Repl(thue, "Rewrite").init()</script>
	<style>
		body { font-family:monospace; overflow:hidden; height:100vh; padding:0; margin:0 }
		body a { color: black; }
		body ::selection { background:#000;color:#fff;text-decoration:none }
		noscript { width: 100%; height:100%; background:red }
		textarea { resize:none; width:calc(100vw - 20px); height:100vh; border:0; padding:10px; margin:0px; background:#72dec2; tab-size: 2; }
		textarea:focus { outline: none !important; }
		div#logs { background:#8ff2d9; padding:10px; color:black; height:85px; overflow-x:hidden; overflow-y:scroll; white-space:pre; display:none }
		div#menu { height:25px; background:#b2ffeb; padding:10px; margin-bottom:20px;font-weight:bold; display:none }
		div#menu select { float:right }
		div#menu a { text-decoration: none }
		div#menu a:hover { text-decoration: underline }
		body.active textarea { height:calc(100% - 170px); }
		body.active #logs, body.active #menu, body.active #editor { display:block !important }
		#run { cursor:pointer; background:#000; color:white; border:0px; border-radius:100px; line-height:24px; padding:0px 10px; font-size:12px }
		#run:hover { background: #fff; color:#000 }
	</style>
</body>
</html>
