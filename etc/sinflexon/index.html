<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta property='og:type' content='website'/>
	<meta property='og:site_name' content='SinFlexion'/>
	<meta property="og:title" content="Latin Sin Flexion Translator"/>
	<meta property='og:description' content="By Devine Lu Linvega"/>
	<meta property='og:logo' content="https://wiki.xxiivv.com/media/services/lo_icon.png"/>
	<meta property='og:image' content="https://wiki.xxiivv.com/media/services/lo_logo.png"/>
	<meta property="og:url" content="https://wiki.xxiivv.com/site/latin_sin_flexion.html"/>
	<meta name="viewport" content="width=device-width" />
	<link href="../../media/services/lo_icon.png" type="image/png" rel="shortcut icon">
	<title>Latin Sin Flexion Translator</title>
	<script src="src/dict.js"></script>
</head>
<body>
	<noscript>The search requires Javascript.</noscript>
	<div id='form'>
		<input type="text" id="search" placeholder="blue">
		<input type="button" id="button" value="Search"/>
	</div>
	<p id='info'></p>
	<hr/>
	<ul id="result"></ul>
	<!-- Le symbol pour une vie exempte de perdant! -->
</body>
<script type="text/javascript">
'use strict'

let db = {en:{}, lo:{}}

function make_def(type, val, note) {
	let res = ""
	if(type != "_") res += `[${type}] `
	res += val
	if(note) res += ` <i>${note}</i>`
	return res
}

function push_word(dict, key, type, val, note) {
	if(!db[dict][key]) db[dict][key] = []
	db[dict][key].push(make_def(type, val, note))
}

dict.split('\n').forEach((value) => {
	if(!value) return
	let seg = value.split('[')
	let key = seg[0].trim().toLowerCase()
	let res = seg[1].split(']')
	let type = res[0].trim()
	let vals = res[1].split(';')
	if(!type) type = '_'
	vals.forEach((val) => {
		let v = val.trim()
		let note = ""
		if(v.indexOf('(') >= 0) {
			note = v.split('(')[1].split(')')[0]
			v = v.replace(`(${note})`, '').trim()
		}
		push_word("en", key, type, v, note)
		push_word("lo", v, type, key, note)
	})
})
let en_keys = Object.keys(db.en)
let lo_keys = Object.keys(db.lo)

document.getElementById("info").innerHTML = `${en_keys.length + lo_keys.length} entries`

function print_entry(a,b,c) {
	let res = ""
	if(b != '_')
		res += `<li><b>${a}</b>[${b}]: ${c} </li>`
	else
		res += `<li><b>${a}</b>: ${c} </li>`
	return res
}
function is_vowel(letter) {
	return letter == 'a' || letter == 'e' || letter == 'i' || letter == 'o' || letter == 'u'
}

function print_lo(word) {
	let res = []
	let last = ""
	// Combine repeated letters
	word.split('').forEach((letter, id) => {
		if(last != letter)
			res.push(letter), last = letter
	})
	// Pop ending vowels
	while(is_vowel(res[res.length-1])) 
		res.pop()
	return `${res.join('')}`
}

function print_latin(t) {
	let res = ""
	db.lo[t].forEach((k) => {
		res += `<li><b>${print_lo(t)}</b>: ${k}</li>`
	})
	return res
}
function print_english(t) {
	let res = ""
	db.en[t].forEach((k) => {
		res += `<li><b>${t}</b>: ${k}</li>`
	})
	return res
}

function search_term(target) {
	let res = ``
	if(res != '')
		res += `<br>`
	res += `<li><i>English/LsF</i></li>`
	if(db.en[target])
		res += print_english(target)
	res += `<ul class='en'>`
	// Search English
	en_keys.forEach((k) => {
		if(k.indexOf(target) >= 0 && k != target) {
			res += print_english(k)
		}
	})
	res += `</ul>`
	res += `<br>`
	res += `<li><i>Lø/English</i></li>`
	if(db.lo[target])
		res += print_latin(target)
	res += `<ul class='lo'>`
	// Search Latin
	lo_keys.forEach((k) => {
		if(k.indexOf(target) >= 0 && k != target) {
			res += print_latin(k)
		}
	})
	res += `<ul>`
	document.getElementById("result").innerHTML += res
}

function run_search(target) {
	if (!target.length) return
	window.location.hash = target.replaceAll(" ", "+")
	document.getElementById("search").value = target
	document.getElementById("result").innerHTML = ""	
	target.toLowerCase().replaceAll(",","").replaceAll("!","").replaceAll("?","").replaceAll(".","").split(" ").forEach(search_term)
}

// Connect interface
document.getElementById("search").addEventListener("keyup", (event) => {
	if (event.key === "Enter") run_search(event.target.value.toLowerCase())
});
document.getElementById("button").onclick = (event) => {
	run_search(document.getElementById("search").value.toLowerCase())
}
// Read anchor tag on start
if (window.location.hash.substring(1))
	run_search(window.location.hash.replaceAll("+", " ").substring(1))
	
</script>
<style>
</style>
</html>
