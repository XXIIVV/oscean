<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta property='og:type' content='website'/>
	<meta property='og:site_name' content='Varvara5'/>
	<meta property='og:description' content="By Hundred Rabbits"/>
	<meta property='og:logo' content="media/services/rejoice_logo.png"/>
	<meta property='og:image' content="media/services/rejoice_icon.png"/>
	<meta property="og:title" content="Rejoice Interpreter"/>
	<meta property="og:url" content="https://wiki.xxiivv.com/site/rejoice.html"/>
	<meta name="viewport" content="width=device-width" />
	<link href="../../media/services/rejoice_icon.png" type="image/png" rel="shortcut icon">
	<title>Rejoice Playground</title>
	<script src="../uxnrepl/src/uxn.js"></script>
	<script src="../uxnrepl/src/emu.js"></script>
	<script src="src/rejoice.js"></script>
	<script src="src/examples.js"></script>
</head>
<body>
	<!-- 
		[] es nihil, identitate. 
		[]/n es predecessore. 
		n es successore!
	-->
	<noscript>
		<p>The <a href='../../site/rejoice.html'>Rejoice</a> interpreter in this iframe relies on Javascript, but don't worry, 
		you don't actually need a browser to use it.<br/><br/>
		You can grab a copy of the Uxntal source <a href='../rejoice.tal.txt' target='_blank'>here</a><br />
		and run it in your <a href='../../site/uxn.html' target='_blank'>favourite emulator</a>.<br /><br />
		<img src='../../media/refs/makima.png'/></p>
	</noscript>
	<textarea id="editor" spellcheck="false" style='display:none'></textarea>
	<div id='logs'>Press <b>Reduce</b> to evaluate.</div>
	<div id='menu'>
		<input type="button" id="run" value="Reduce">
		<span id='result'><a href='../../site/rejoice.html' target='_blank'>Read Manual</a></span>
		<select id="examples"></select>
	</div>
	<script type="text/javascript">new Repl(rejoice, "Reduce").init()</script>
	<style>
		body { font-family:monospace; overflow:hidden; height:100vh; padding:0; margin:0 }
		body a { color: black }
		body ::selection { text-decoration:none; background:#000;color:#fff }
		noscript { width: 100%; height:100% }
		textarea { resize:none; width:calc(100vw - 20px); height:100vh; border:0; padding:10px; margin:0px; tab-size: 2 }
		textarea:focus { outline: none !important }
		div#logs { padding:10px; color:black; height:85px; overflow-x:hidden; overflow-y:scroll; white-space:pre; display:none }
		div#menu { height:25px; padding:10px; margin-bottom:20px;font-weight:bold; display:none }
		div#menu select { float:right }
		div#menu a { text-decoration: none; font-weight:normal }
		div#menu a:hover { text-decoration: underline }
		body.active textarea { height:calc(100% - 170px) }
		body.active #logs, body.active #menu, body.active #editor { display:block !important }
		#run { cursor:pointer; border:0px; border-radius:100px; line-height:24px; padding:0px 10px; font-size:12px }
		/* Overrides */
		body ::selection { background:#000;color:#fff }
		textarea { background:#72dec2 }
		div#logs { background:#8ff2d9; color:black }
		div#menu { background:#b2ffeb }
		#run { background:#000; color:white }
		#run:hover { background: #fff; color:#000 }
	</style>
</body>
</html>
