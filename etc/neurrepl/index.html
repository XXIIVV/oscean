<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta property='og:type' content='website'/>
	<meta property='og:site_name' content="Uxn Interpreter"/>
	<meta property="og:title" content="Neur Playground"/>
	<meta property='og:description' content="By Devine Lu Linvega"/>
	<meta property='og:logo' content="https://wiki.xxiivv.com/media/services/icon.png"/>
	<meta property='og:image' content="https://wiki.xxiivv.com/media/services/image.png"/>
	<meta property="og:url" content="https://wiki.xxiivv.com/site/neur.html"/>
	<meta name="viewport" content="width=device-width" />
	<link href="../../media/services/icon.png" type="image/png" rel="shortcut icon">
	<title>Neur Playground</title>
	<script src="../uxnrepl/src/uxn.js"></script>
	<script src="../uxnrepl/src/emu.js"></script>
	<script src="src/neur.js"></script>
	<script src="src/examples.js"></script>
</head>
<body>
	<textarea id="editor" spellcheck="false">
Welcome to the Neur playground,
Click the Wake Up button to evaluate the program.
Select other examples with the dropdown.

Chores.
	- Cook dinner*
	- Clean dishes*
	- Shovel snow*
	: The chores are done*.

Once you're done*:
	you can go play*.

Removed snow*, did dinner* & dishes*.
</textarea>
	<div id='logs'>Press <b>Wake Up</b> to animate.</div>
	<div id='menu'>
		<input type="button" id="run" value="Loading..">
		<span id='result'><a href='../../site/neur.html' target='_blank'>Read Manual</a></span>
		<select id="examples"></select>
	</div>
	<script type="text/javascript">new Repl(neur, "Wake Up").init()</script>
	<style>
		body { font-family:monospace; overflow:hidden; height:100vh; padding:0; margin:0 }
		body a { color: black }
		body ::selection { text-decoration:none; background:#000;color:#fff }
		noscript { width: 100%; height:100% }
		textarea { resize:none; width:calc(100vw - 20px); height:100vh; border:0; padding:10px; margin:0px; tab-size: 2 }
		textarea:focus { outline: none !important }
		div#logs { padding:10px; color:black; height:85px; overflow-x:hidden; overflow-y:scroll; white-space:pre; display:none }
		div#menu { height:25px; padding:10px; margin-bottom:20px;font-weight:bold; display:none }
		div#menu select { float:right }
		div#menu a { text-decoration: none; font-weight:normal }
		div#menu a:hover { text-decoration: underline }
		body.active textarea { height:calc(100% - 170px) }
		body.active #logs, body.active #menu, body.active #editor { display:block !important }
		#run { cursor:pointer; border:0px; border-radius:100px; line-height:24px; padding:0px 10px; font-size:12px }
		/* Overrides */
		body ::selection { background:#ffbb3a;color:#000 }
		textarea { background:#ff9f70; color:black }
		div#logs { background:#e78d61; color:#333 }
		div#menu { background:#d0815a; color:#fff }
		div#menu a, div#menu #result { color:#fff }
		#run { background:#222; color:#ff9f70 }
		#run:hover { background: #fff; color:#ff9f70 }
	</style>
</body>
</html>
